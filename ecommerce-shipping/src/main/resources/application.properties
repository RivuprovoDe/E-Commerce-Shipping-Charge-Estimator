spring.application.name=ecommerce-shipping

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:shippingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
# Note: H2Dialect is intentionally omitted — Hibernate auto-detects it for H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# SQL initialisation
# defer-datasource-initialization ensures data.sql runs after Hibernate has
# created the schema, not before (which is the default Spring Boot 2.5+ behaviour).
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Suppress the open-in-view warning — views are not used in this REST API
spring.jpa.open-in-view=false

# H2 Console (available at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080

# Logging
logging.level.com.jumbotail=INFO
logging.level.org.springframework.cache=DEBUG
